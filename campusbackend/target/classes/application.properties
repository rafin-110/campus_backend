# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Supabase PostgreSQL ───────────────────────────────────────────────────────
# Set these as environment variables (or in .env) — NEVER hardcode secrets!
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/campusdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Mail (Gmail SMTP) ─────────────────────────────────────────────────────────
# Set MAIL_USERNAME and MAIL_APP_PASSWORD as environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT (future use — set a strong 256-bit secret in env) ────────────────────
jwt.secret=${JWT_SECRET:changeme-replace-with-256bit-secret-in-production}
jwt.expiry-ms=86400000
